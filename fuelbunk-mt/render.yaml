services:
  - type: web
    name: fuelbunk-pro-mt
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/fuelbunk.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SUPER_ADMIN_USERNAME
        value: superadmin
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
    disk:
      name: fuelbunk-data
      mountPath: /data
      sizeGB: 1
